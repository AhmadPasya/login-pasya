<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Lowongan</title>
    <link rel="stylesheet" href="DaftarLowongan.css">
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Daftar Lowongan Pekerjaan</h1>
        <p>Temukan pekerjaan impianmu di sini</p>
    </div>

    <!-- FILTER -->
    <div id="filter-section">
        <h3>Filter Kategori:</h3>
        <select id="filter-kategori">
            <option value="Semua">Semua</option>
            <option value="Administrasi">Administrasi</option>
            <option value="Teknik">Teknik</option>
            <option value="Retail">Retail</option>
            <option value="IT">IT</option>
        </select>
    </div>

    <!-- STATISTIK INFO -->
    <div id="statistik" style="margin: 0 20px 10px 20px; padding: 10px; background-color: #e8f4ff; border-radius: 8px; text-align: center;">
    </div>

    <!-- TABEL LOWONGAN -->
    <h3 class="judul-utama">Lowongan Tersedia</h3>
    
    <table id="daftar-tabel" border="1">
        <thead>
            <tr>
                <th>Posisi</th>
                <th>Perusahaan</th>
                <th>Lokasi</th>
                <th>Kategori</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabel-body">
        </tbody>
    </table>

    <!-- FOOTER -->
     
<footer class="footer">
    <div class="footer-content">
        <a href="#">Tentang Kami</a>
        <a href="#">Kontak</a>
        <a href="#">Kebijakan Privasi</a>
        <a href="#">Pusat Bantuan</a>
    </div>
</footer>

    <!-- JavaScript Eksternal -->
    <script src="DaftarLowongan.js"></script>
</body>
</html>
